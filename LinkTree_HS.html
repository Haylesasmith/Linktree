<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Linktree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .link {
            display: block;
            margin: 15px 0;
            padding: 15px;
            text-decoration: none;
            font-size: 1.2rem;
            color: #fff;
            background-color: #0077b5; /* LinkedIn blue */
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }
        .link:hover {
            background-color: #005582;
        }
        .google-scholar {
            background-color: #4285F4; /* Google Scholar blue */
        }
        .google-scholar:hover {
            background-color: #2a65c7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Linktree</h1>
        <a href="https://www.linkedin.com/in/hayley-smith-b8592674/" class="link" target="_blank">LinkedIn</a>
        <a href="https://scholar.google.ca/citations?user=oW5bmsYAAAAJ&hl=en" class="link google-scholar" target="_blank">Google Scholar</a>
    </div>
</body>
</html>
